{% extends "base.html" %}

{% block title %}InkTime 相册 - 搜索{% endblock %}

{% block content %}
  <!-- Search Results -->
  <h2 class="mb-4">搜索结果：<span id="search-query"></span></h2>
  
  <div class="row" id="search-results">
    <!-- Search results will be inserted here by JavaScript -->
  </div>

  <!-- Loading Indicator -->
  <div class="text-center my-5" id="loading">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">加载中...</span>
    </div>
  </div>

  <!-- Pagination -->
  <nav class="mt-5" aria-label="Page navigation">
    <ul class="pagination justify-content-center" id="pagination">
      <!-- Pagination links will be inserted here by JavaScript -->
    </ul>
  </nav>
{% endblock %}

{% block extra_js %}
  <script src="{{ url_for('static', filename='js/search.js') }}?v=2"></script>
{% endblock %}
