{% extends "base.html" %}

{% block title %}InkTime 相册 - 搜索{% endblock %}

{% block content %}
  <!-- Search Form -->
  <div class="mb-4">
    <form class="d-flex" action="{{ url_for('search') }}" method="get">
      <input class="form-control me-2" type="search" placeholder="搜索照片" name="q" value="{{ query }}">
      <button class="btn btn-outline-primary" type="submit">搜索</button>
    </form>
  </div>

  <!-- Search Results -->
  <h2 class="mb-4">搜索结果: {{ query }}</h2>
  
  <div class="row" id="search-results">
    <!-- Search results will be inserted here by JavaScript -->
  </div>

  <!-- Loading Indicator -->
  <div class="text-center my-5" id="loading">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">加载中...</span>
    </div>
  </div>

  <!-- Pagination -->
  <nav class="mt-5" aria-label="Page navigation">
    <ul class="pagination justify-content-center" id="pagination">
      <!-- Pagination links will be inserted here by JavaScript -->
    </ul>
  </nav>
{% endblock %}

{% block extra_js %}
  <script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}
