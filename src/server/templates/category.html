{% extends "base.html" %}

{% block title %}InkTime 相册 - 分类{% endblock %}

{% block content %}
  <!-- Category Statistics -->
  <div class="row mb-4" id="category-stats">
    <!-- Statistics cards will be inserted here by JavaScript -->
  </div>

  <!-- Category Content -->
  <div class="row" id="category-content">
    <!-- Category photos will be inserted here by JavaScript -->
  </div>

  <!-- Loading Indicator -->
  <div class="text-center my-5" id="loading">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">加载中...</span>
    </div>
  </div>

  <!-- Pagination -->
  <nav class="mt-5" aria-label="Page navigation">
    <ul class="pagination justify-content-center" id="pagination">
      <!-- Pagination links will be inserted here by JavaScript -->
    </ul>
  </nav>
{% endblock %}

{% block extra_js %}
  <script src="{{ url_for('static', filename='js/category.js') }}?v=3"></script>
{% endblock %}
