{% extends "base.html" %}

{% block title %}InkTime 相册 - 分类{% endblock %}

{% block content %}
  <!-- Category Statistics -->
  <div class="row mb-4" id="category-stats">
    <!-- Statistics will be inserted here by JavaScript -->
  </div>

  <!-- Category Navigation -->
  <div class="mb-4">
    <div class="row">
      <div class="col-md-12">
        <div class="btn-group-vertical btn-group-lg" role="group" style="width: 100%;" id="category-buttons">
          <button type="button" class="btn btn-outline-primary active" data-category="all">全部照片</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Category Content -->
  <div class="row" id="category-content">
    <!-- Category photos will be inserted here by JavaScript -->
  </div>

  <!-- Loading Indicator -->
  <div class="text-center my-5" id="loading">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">加载中...</span>
    </div>
  </div>

  <!-- Pagination -->
  <nav class="mt-5" aria-label="Page navigation">
    <ul class="pagination justify-content-center" id="pagination">
      <!-- Pagination links will be inserted here by JavaScript -->
    </ul>
  </nav>
{% endblock %}

{% block extra_js %}
  <script src="{{ url_for('static', filename='js/category.js') }}?v=2"></script>
{% endblock %}
