{% extends "base.html" %}

{% block title %}InkTime 相册 - 首页{% endblock %}

{% block content %}
  <!-- Filter Bar -->
  <div class="mb-4">
    <div class="row">
      <div class="col-md-6">
        <div class="btn-group" role="group">
          <button type="button" class="btn btn-outline-primary active" data-filter="all">全部</button>
          <button type="button" class="btn btn-outline-primary" data-filter="person">人物</button>
          <button type="button" class="btn btn-outline-primary" data-filter="landscape">风景</button>
          <button type="button" class="btn btn-outline-primary" data-filter="food">美食</button>
          <button type="button" class="btn btn-outline-primary" data-filter="other">其他</button>
        </div>
      </div>
      <div class="col-md-6 text-md-end">
        <div class="btn-group" role="group">
          <button type="button" class="btn btn-outline-secondary active" data-sort="latest">最新</button>
          <button type="button" class="btn btn-outline-secondary" data-sort="oldest">最早</button>
          <button type="button" class="btn btn-outline-secondary" data-sort="memory">回忆度</button>
          <button type="button" class="btn btn-outline-secondary" data-sort="beauty">美观度</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Photo Grid -->
  <div class="row" id="photo-grid">
    <!-- Photo cards will be inserted here by JavaScript -->
  </div>

  <!-- Loading Indicator -->
  <div class="text-center my-5" id="loading">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">加载中...</span>
    </div>
  </div>

  <!-- Pagination -->
  <nav class="mt-5" aria-label="Page navigation">
    <ul class="pagination justify-content-center" id="pagination">
      <!-- Pagination links will be inserted here by JavaScript -->
    </ul>
  </nav>
{% endblock %}

{% block extra_js %}
  <script src="{{ url_for('static', filename='js/gallery.js') }}"></script>
{% endblock %}
